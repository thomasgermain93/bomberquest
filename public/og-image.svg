<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond sombre -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Grille pixel décorative (légère) -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Étoiles / pixels décoratifs gold -->
  <rect x="80" y="60" width="8" height="8" fill="#f59e0b" opacity="0.9"/>
  <rect x="120" y="100" width="6" height="6" fill="#f59e0b" opacity="0.6"/>
  <rect x="60" y="150" width="4" height="4" fill="#3b82f6" opacity="0.8"/>
  <rect x="200" y="80" width="6" height="6" fill="#3b82f6" opacity="0.5"/>
  <rect x="180" y="200" width="4" height="4" fill="#f59e0b" opacity="0.7"/>
  <rect x="40" y="300" width="8" height="8" fill="#3b82f6" opacity="0.4"/>
  <rect x="140" y="500" width="6" height="6" fill="#f59e0b" opacity="0.6"/>
  <rect x="100" y="450" width="4" height="4" fill="#3b82f6" opacity="0.7"/>

  <rect x="1060" y="80" width="8" height="8" fill="#f59e0b" opacity="0.9"/>
  <rect x="1100" y="120" width="6" height="6" fill="#3b82f6" opacity="0.6"/>
  <rect x="1140" y="60" width="4" height="4" fill="#f59e0b" opacity="0.8"/>
  <rect x="1020" y="200" width="6" height="6" fill="#3b82f6" opacity="0.5"/>
  <rect x="1080" y="480" width="8" height="8" fill="#f59e0b" opacity="0.7"/>
  <rect x="1150" y="420" width="4" height="4" fill="#3b82f6" opacity="0.6"/>
  <rect x="1020" y="540" width="6" height="6" fill="#f59e0b" opacity="0.5"/>

  <rect x="600" y="40" width="6" height="6" fill="#f59e0b" opacity="0.7"/>
  <rect x="640" y="580" width="8" height="8" fill="#3b82f6" opacity="0.6"/>
  <rect x="560" y="570" width="4" height="4" fill="#f59e0b" opacity="0.5"/>

  <!-- Bombe pixel art (centrée à gauche) -->
  <g transform="translate(240, 200)">
    <!-- Corps de la bombe (cercle pixelisé) -->
    <rect x="20" y="40" width="120" height="120" fill="#1a1a1a" rx="0"/>
    <!-- Pixels du corps rond -->
    <rect x="40" y="20" width="80" height="140" fill="#2a2a2a"/>
    <rect x="20" y="40" width="120" height="100" fill="#2a2a2a"/>
    <rect x="30" y="30" width="100" height="120" fill="#333333"/>
    <!-- Reflet brillant -->
    <rect x="50" y="50" width="30" height="20" fill="#4a4a4a" opacity="0.6"/>
    <!-- Mèche -->
    <rect x="70" y="0" width="8" height="30" fill="#8B4513"/>
    <rect x="78" y="0" width="6" height="8" fill="#f59e0b"/>
    <rect x="84" y="0" width="4" height="4" fill="#ff6b35"/>
    <!-- Étincelle -->
    <rect x="80" y="-10" width="6" height="6" fill="#f59e0b" opacity="0.9"/>
    <rect x="88" y="-16" width="4" height="4" fill="#ff6b35" opacity="0.8"/>
    <rect x="86" y="-4" width="8" height="4" fill="#f59e0b" opacity="0.6"/>
  </g>

  <!-- Titre principal "BomberQuest" -->
  <text
    x="600"
    y="230"
    font-family="monospace, 'Courier New', Courier"
    font-size="90"
    font-weight="bold"
    fill="#f59e0b"
    text-anchor="middle"
    letter-spacing="4"
    style="text-shadow: 4px 4px 0px #7c5200;"
  >BomberQuest</text>

  <!-- Ombre du titre -->
  <text
    x="604"
    y="234"
    font-family="monospace, 'Courier New', Courier"
    font-size="90"
    font-weight="bold"
    fill="#7c5200"
    text-anchor="middle"
    letter-spacing="4"
    opacity="0.5"
  >BomberQuest</text>
  <!-- Titre au premier plan -->
  <text
    x="600"
    y="230"
    font-family="monospace, 'Courier New', Courier"
    font-size="90"
    font-weight="bold"
    fill="#f59e0b"
    text-anchor="middle"
    letter-spacing="4"
  >BomberQuest</text>

  <!-- Séparateur ligne dorée -->
  <rect x="300" y="260" width="600" height="4" fill="#f59e0b" opacity="0.6"/>
  <rect x="300" y="260" width="600" height="2" fill="#fbbf24"/>

  <!-- Sous-titre -->
  <text
    x="600"
    y="330"
    font-family="monospace, 'Courier New', Courier"
    font-size="36"
    fill="#3b82f6"
    text-anchor="middle"
    letter-spacing="6"
  >Idle RPG · Gacha · Pixel Art</text>

  <!-- Petits pixels déco autour du sous-titre -->
  <rect x="270" y="308" width="10" height="10" fill="#3b82f6" opacity="0.7"/>
  <rect x="920" y="308" width="10" height="10" fill="#3b82f6" opacity="0.7"/>
  <rect x="258" y="318" width="6" height="6" fill="#f59e0b" opacity="0.5"/>
  <rect x="936" y="318" width="6" height="6" fill="#f59e0b" opacity="0.5"/>

  <!-- Bandeau bas : tagline -->
  <rect x="0" y="480" width="1200" height="150" fill="#0d0d18" opacity="0.8"/>
  <text
    x="600"
    y="555"
    font-family="monospace, 'Courier New', Courier"
    font-size="24"
    fill="#94a3b8"
    text-anchor="middle"
    letter-spacing="2"
  >Collecte des héros · Explore des cartes · Domine le mode Histoire</text>
  <text
    x="600"
    y="600"
    font-family="monospace, 'Courier New', Courier"
    font-size="18"
    fill="#475569"
    text-anchor="middle"
    letter-spacing="3"
  >bomberquest.app</text>

  <!-- Bordure pixel art sur les coins -->
  <rect x="0" y="0" width="20" height="20" fill="#f59e0b" opacity="0.3"/>
  <rect x="1180" y="0" width="20" height="20" fill="#f59e0b" opacity="0.3"/>
  <rect x="0" y="610" width="20" height="20" fill="#f59e0b" opacity="0.3"/>
  <rect x="1180" y="610" width="20" height="20" fill="#f59e0b" opacity="0.3"/>
  <!-- Lignes de bordure -->
  <rect x="0" y="0" width="1200" height="4" fill="#f59e0b" opacity="0.2"/>
  <rect x="0" y="626" width="1200" height="4" fill="#f59e0b" opacity="0.2"/>
  <rect x="0" y="0" width="4" height="630" fill="#f59e0b" opacity="0.2"/>
  <rect x="1196" y="0" width="4" height="630" fill="#f59e0b" opacity="0.2"/>
</svg>
